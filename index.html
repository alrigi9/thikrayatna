<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ذكرياتنا ✈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f5;padding:1rem}
#app{width:100%;max-width:560px;min-height:600px;border-radius:24px;position:relative;overflow:hidden;transition:background 0.5s}
canvas#particles{position:absolute;inset:0;z-index:0;pointer-events:none}
.page{display:none;padding:2.5rem 2rem;position:relative;z-index:2}
.page.active{display:block;animation:fadeSlide 0.4s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.t-sakura{--bg1:#fff0f5;--bg2:#ffe4ef;--acc:#c2185b;--acc2:#f06292;--acc3:#fce4ec;--txt:#4b1528}
.t-ocean {--bg1:#e8f4fd;--bg2:#d0eaf8;--acc:#0d47a1;--acc2:#1976d2;--acc3:#e3f2fd;--txt:#042c53}
.t-sunset{--bg1:#fff3e0;--bg2:#ffe0b2;--acc:#bf360c;--acc2:#e64a19;--acc3:#fbe9e7;--txt:#412402}
.t-forest{--bg1:#e8f5e9;--bg2:#c8e6c9;--acc:#1b5e20;--acc2:#388e3c;--acc3:#f1f8e9;--txt:#173404}
.t-galaxy{--bg1:#1a1a2e;--bg2:#16213e;--acc:#7c4dff;--acc2:#aa00ff;--acc3:#2d1b69;--txt:#ede7ff}

#app{background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%)}

.deco{position:absolute;border-radius:50%;opacity:0.12;z-index:1;pointer-events:none}
.deco1{width:220px;height:220px;background:var(--acc);top:-70px;right:-70px}
.deco2{width:160px;height:160px;background:var(--acc2);bottom:-50px;left:-50px}

.hero-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--acc);text-align:center;margin-bottom:6px}
.hero-sub{font-size:14px;color:var(--txt);opacity:0.65;text-align:center;margin-bottom:2rem}

label.lbl{font-size:11px;font-weight:700;color:var(--acc);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1px}
.fi{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid var(--acc2);background:rgba(255,255,255,0.7);font-size:15px;color:var(--txt);font-family:'Tajawal',sans-serif;outline:none;transition:all 0.2s;margin-bottom:1.2rem}
.fi:focus{border-color:var(--acc);background:rgba(255,255,255,0.95);box-shadow:0 0 0 3px rgba(0,0,0,0.06)}
.fi::placeholder{color:var(--txt);opacity:0.35}

.add-btn{background:none;border:1.5px dashed var(--acc2);color:var(--acc);padding:10px 16px;border-radius:12px;cursor:pointer;font-size:13px;font-family:'Tajawal',sans-serif;width:100%;margin-bottom:1.2rem;transition:all 0.2s}
.add-btn:hover{background:var(--acc3)}
.rm-btn{background:none;border:none;color:var(--acc2);cursor:pointer;font-size:16px;padding:0 6px;opacity:0.6;line-height:1}
.rm-btn:hover{opacity:1}
.person-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.person-row .fi{flex:1;margin:0}

.themes-row{display:flex;gap:12px;margin-bottom:2rem;flex-wrap:wrap}
.swatch{width:46px;height:46px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.2s,border-color 0.2s}
.swatch.active{border-color:var(--txt);transform:scale(1.15)}
.swatch[data-t=sakura]{background:linear-gradient(135deg,#f48fb1,#c2185b)}
.swatch[data-t=ocean] {background:linear-gradient(135deg,#64b5f6,#0d47a1)}
.swatch[data-t=sunset]{background:linear-gradient(135deg,#ffab40,#bf360c)}
.swatch[data-t=forest]{background:linear-gradient(135deg,#81c784,#1b5e20)}
.swatch[data-t=galaxy]{background:linear-gradient(135deg,#e040fb,#7c4dff)}

.start-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--acc);color:#fff;font-size:16px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px}
.start-btn:hover{background:var(--acc2);transform:translateY(-2px)}

.place-banner{background:rgba(255,255,255,0.55);border-radius:16px;padding:1rem 1.5rem;margin-bottom:1.5rem;border:1px solid rgba(255,255,255,0.8)}
.place-step{font-size:11px;color:var(--acc2);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
.chip{padding:5px 14px;border-radius:20px;background:var(--acc3);color:var(--acc);font-size:13px;font-weight:500;border:1.5px solid var(--acc2)}

.t-card{background:rgba(255,255,255,0.55);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;border:1px solid rgba(255,255,255,0.75)}
.t-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.t-nm{font-size:14px;font-weight:500;color:var(--txt)}

.upload-zone{border:2px dashed var(--acc2);border-radius:12px;padding:1.2rem;text-align:center;cursor:pointer;background:rgba(255,255,255,0.3);transition:background 0.15s}
.upload-zone:hover{background:var(--acc3)}
.upload-zone input{display:none}
.upload-ico{font-size:22px;margin-bottom:4px;color:var(--acc2)}
.upload-lbl{font-size:12px;color:var(--acc2)}
.photo-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.photo-thumb{width:64px;height:64px;border-radius:10px;object-fit:cover;border:2px solid rgba(255,255,255,0.85)}

.btn-row{display:flex;gap:10px;margin-top:1.5rem}
.btn-next{flex:1;padding:13px;border-radius:12px;border:none;background:var(--acc);color:#fff;font-size:14px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all 0.2s}
.btn-next:hover{background:var(--acc2)}
.btn-end{padding:13px 20px;border-radius:12px;border:1.5px solid var(--acc);background:transparent;color:var(--acc);font-size:14px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all 0.2s}
.btn-end:hover{background:var(--acc3)}

.sum-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--acc);text-align:center;margin-bottom:4px}
.sum-sub{font-size:13px;color:var(--txt);opacity:0.6;text-align:center;margin-bottom:2rem}
.sum-card{background:rgba(255,255,255,0.6);border-radius:16px;padding:1.25rem;margin-bottom:1.2rem;border:1px solid rgba(255,255,255,0.85)}
.sum-card-title{font-size:15px;font-weight:700;color:var(--acc);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pnum{width:26px;height:26px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sum-t-lbl{font-size:12px;color:var(--acc2);font-weight:700;margin-bottom:6px;margin-top:10px}
.sum-photos{display:flex;flex-wrap:wrap;gap:6px}
.sum-photos img{width:58px;height:58px;border-radius:10px;object-fit:cover;border:2px solid rgba(255,255,255,0.9)}
.new-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--acc);color:#fff;font-size:15px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;margin-top:1rem;transition:all 0.2s}
.new-btn:hover{background:var(--acc2)}

.error-shake{animation:shake 0.35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div id="app" class="t-sakura">
  <canvas id="particles"></canvas>
  <div class="deco deco1"></div>
  <div class="deco deco2"></div>

  <!-- SETUP -->
  <div id="p-setup" class="page active" style="max-width:480px;margin:0 auto">
    <div style="text-align:center;margin-bottom:1.5rem;padding-top:0.5rem">
      <div style="font-size:40px;margin-bottom:8px">✈️</div>
      <div class="hero-title">ذكرياتنا</div>
      <div class="hero-sub">سجّل لحظاتك مع من تحب في كل مكان</div>
    </div>

    <label class="lbl">اسمك *</label>
    <input class="fi" id="name-main" placeholder="اكتب اسمك هنا..." />

    <div id="extra-names"></div>
    <button class="add-btn" id="add-btn" onclick="addPerson()">+ أضف شخص معك (اختياري)</button>

    <label class="lbl">ثيم الرحلة</label>
    <div style="margin-bottom:8px;font-size:13px;color:var(--txt);opacity:0.65" id="theme-name-lbl">وردي ساكورا 🌸</div>
    <div class="themes-row">
      <div class="swatch active" data-t="sakura" title="وردي ساكورا" onclick="setTheme('sakura',this)"></div>
      <div class="swatch" data-t="ocean"  title="المحيط الأزرق" onclick="setTheme('ocean',this)"></div>
      <div class="swatch" data-t="sunset" title="غروب الشمس"   onclick="setTheme('sunset',this)"></div>
      <div class="swatch" data-t="forest" title="الغابة الخضراء" onclick="setTheme('forest',this)"></div>
      <div class="swatch" data-t="galaxy" title="مجرة الفضاء"   onclick="setTheme('galaxy',this)"></div>
    </div>

    <button class="start-btn" onclick="startTrip()">ابدأ رحلتك ✈</button>
  </div>

  <!-- PLACE -->
  <div id="p-place" class="page" style="max-width:500px;margin:0 auto">
    <div class="place-banner">
      <div class="place-step" id="place-lbl">المكان 1</div>
      <input class="fi" id="place-input" placeholder="اسم المكان..." style="margin-bottom:0;margin-top:6px" />
    </div>
    <div class="chips" id="chips"></div>
    <div id="uploads"></div>
    <div class="btn-row">
      <button class="btn-end" onclick="finishTrip()">إنهاء الرحلة 🏁</button>
      <button class="btn-next" onclick="nextPlace()">المكان التالي →</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="p-summary" class="page" style="max-width:500px;margin:0 auto">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:38px;margin-bottom:8px">🎉</div>
      <div class="sum-title">ذكرياتكم</div>
      <div class="sum-sub" id="sum-names"></div>
    </div>
    <div id="sum-places"></div>
    <button class="new-btn" onclick="newTrip()">رحلة جديدة ✈</button>
  </div>
</div>

<script>
const themeNames={sakura:'وردي ساكورا 🌸',ocean:'المحيط الأزرق 🌊',sunset:'غروب الشمس 🌅',forest:'الغابة الخضراء 🌿',galaxy:'مجرة الفضاء 🌌'};
let S={theme:'sakura',names:[],places:[],cur:{}};
let pInterval=null;

function setTheme(t,el){
  S.theme=t;
  document.getElementById('app').className='t-'+t;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('theme-name-lbl').textContent=themeNames[t];
  startParticles();
}

function addPerson(){
  const c=document.getElementById('extra-names');
  const count=c.querySelectorAll('.person-row').length;
  if(count>=5){document.getElementById('add-btn').style.display='none';return;}
  const div=document.createElement('div');
  div.className='person-row';
  div.innerHTML=`<input class="fi" style="margin:0" placeholder="اسم الشخص ${count+2}..."><button class="rm-btn" onclick="this.parentNode.remove();checkAdd()">✕</button>`;
  c.appendChild(div);
  if(c.querySelectorAll('.person-row').length>=5) document.getElementById('add-btn').style.display='none';
}
function checkAdd(){
  if(document.getElementById('extra-names').querySelectorAll('.person-row').length<5)
    document.getElementById('add-btn').style.display='block';
}

function getNames(){
  const m=document.getElementById('name-main').value.trim();
  if(!m) return null;
  const extras=Array.from(document.querySelectorAll('#extra-names .fi')).map(i=>i.value.trim()).filter(Boolean);
  return [m,...extras];
}

function startTrip(){
  const names=getNames();
  if(!names){
    const inp=document.getElementById('name-main');
    inp.classList.add('error-shake');
    inp.style.borderColor='#e53935';
    setTimeout(()=>{inp.classList.remove('error-shake');inp.style.borderColor=''},600);
    return;
  }
  S.names=names;S.places=[];S.cur={};
  renderPlace();
  showPage('p-place');
}

function renderPlace(){
  document.getElementById('place-lbl').textContent='المكان '+(S.places.length+1);
  document.getElementById('place-input').value='';
  S.cur={};
  S.names.forEach(n=>{S.cur[n]=[]});
  document.getElementById('chips').innerHTML=S.names.map(n=>`<span class="chip">${n}</span>`).join('');
  document.getElementById('uploads').innerHTML=S.names.map(name=>`
    <div class="t-card">
      <div class="t-head">
        <div class="avatar">${name[0]}</div>
        <span class="t-nm">${name}</span>
      </div>
      <div class="upload-zone" onclick="document.getElementById('uf_${encodeURI(name)}').click()">
        <input type="file" id="uf_${encodeURI(name)}" multiple accept="image/*" onchange="handlePhoto(event,'${name.replace(/'/g,"\\'")}')">
        <div class="upload-ico">📷</div>
        <div class="upload-lbl">اضغط لرفع الصور</div>
      </div>
      <div class="photo-row" id="pr_${encodeURI(name)}"></div>
    </div>
  `).join('');
}

function handlePhoto(e,name){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      if(!S.cur[name]) S.cur[name]=[];
      S.cur[name].push(ev.target.result);
      const grid=document.getElementById('pr_'+encodeURI(name));
      if(grid){const img=document.createElement('img');img.src=ev.target.result;img.className='photo-thumb';grid.appendChild(img);}
    };
    r.readAsDataURL(f);
  });
}

function saveCur(){
  const pname=document.getElementById('place-input').value.trim();
  if(!pname) return false;
  S.places.push({name:pname,photos:JSON.parse(JSON.stringify(S.cur))});
  return true;
}

function nextPlace(){
  if(!saveCur()){
    const inp=document.getElementById('place-input');
    inp.classList.add('error-shake');
    inp.style.borderColor='#e53935';
    setTimeout(()=>{inp.classList.remove('error-shake');inp.style.borderColor=''},600);
    return;
  }
  burst();
  renderPlace();
}

function finishTrip(){
  const pname=document.getElementById('place-input').value.trim();
  if(pname) saveCur();
  if(!S.places.length){alert('أضف مكاناً واحداً على الأقل 📍');return;}
  renderSummary();
  burst();
  showPage('p-summary');
}

function renderSummary(){
  document.getElementById('sum-names').textContent=S.names.join(' · ');
  document.getElementById('sum-places').innerHTML=S.places.map((p,i)=>`
    <div class="sum-card">
      <div class="sum-card-title"><span class="pnum">${i+1}</span>${p.name}</div>
      ${S.names.map(nm=>{
        const photos=p.photos[nm]||[];
        return `<div class="sum-t-lbl">${nm}${photos.length?' ('+photos.length+' صورة)':' — لا صور'}</div>
        ${photos.length?`<div class="sum-photos">${photos.map(s=>`<img src="${s}">`).join('')}</div>`:''}`;
      }).join('')}
    </div>
  `).join('');
}

function newTrip(){
  document.getElementById('name-main').value='';
  document.getElementById('extra-names').innerHTML='';
  document.getElementById('add-btn').style.display='block';
  S={theme:S.theme,names:[],places:[],cur:{}};
  showPage('p-setup');
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>{p.classList.remove('active');p.style.display='none'});
  const pg=document.getElementById(id);
  pg.style.display='block';
  requestAnimationFrame(()=>pg.classList.add('active'));
}

function startParticles(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  const app=document.getElementById('app');
  canvas.width=app.offsetWidth;canvas.height=app.offsetHeight;
  const palettes={sakura:['#f48fb1','#f8bbd0','#fce4ec','#e91e63'],ocean:['#64b5f6','#90caf9','#bbdefb','#1976d2'],sunset:['#ffab40','#ffd54f','#ffe082','#ff7043'],forest:['#81c784','#a5d6a7','#c8e6c9','#4caf50'],galaxy:['#e040fb','#ce93d8','#b39ddb','#7c4dff']};
  const cols=palettes[S.theme]||palettes.sakura;
  const pts=Array.from({length:35},()=>({x:Math.random()*canvas.width,y:canvas.height+Math.random()*80,r:Math.random()*4+2,c:cols[Math.floor(Math.random()*cols.length)],speed:Math.random()*0.7+0.3,drift:(Math.random()-0.5)*0.4,op:Math.random()*0.5+0.3}));
  if(pInterval) clearInterval(pInterval);
  pInterval=setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.c;ctx.globalAlpha=p.op;ctx.fill();
      p.y-=p.speed;p.x+=p.drift;p.op-=0.0015;
      if(p.y<-10||p.op<=0){p.y=canvas.height+10;p.x=Math.random()*canvas.width;p.op=Math.random()*0.5+0.3;p.c=cols[Math.floor(Math.random()*cols.length)];}
    });
    ctx.globalAlpha=1;
  },40);
}

function burst(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  const cx=canvas.width/2,cy=canvas.height/2;
  const palettes={sakura:['#f48fb1','#e91e63'],ocean:['#64b5f6','#0d47a1'],sunset:['#ffab40','#e64a19'],forest:['#81c784','#388e3c'],galaxy:['#e040fb','#7c4dff']};
  const cols=palettes[S.theme]||palettes.sakura;
  const pts=Array.from({length:24},()=>{const a=Math.random()*Math.PI*2;return{x:cx,y:cy,vx:Math.cos(a)*(Math.random()*6+2),vy:Math.sin(a)*(Math.random()*6+2),r:Math.random()*5+2,c:cols[Math.floor(Math.random()*2)],op:1};});
  let f=0;
  const anim=setInterval(()=>{
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.op-=0.04;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.globalAlpha=Math.max(0,p.op);ctx.fill();});
    ctx.globalAlpha=1;
    if(++f>35) clearInterval(anim);
  },20);
}

window.addEventListener('load',()=>{
  startParticles();
  new ResizeObserver(()=>{
    const a=document.getElementById('app'),c=document.getElementById('particles');
    if(c){c.width=a.offsetWidth;c.height=a.offsetHeight;}
  }).observe(document.getElementById('app'));
});
</script>
</body>
</html>
